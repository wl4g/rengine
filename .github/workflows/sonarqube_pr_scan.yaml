name: "PR: Test + SonarQube Incremental Scan"

on:
  pull_request:
    branches: ['**']

jobs:
  test-and-sonar:
    name: Test & SonarQube PR Analysis
    runs-on: ubuntu-latest
    if: github.repository == 'wl4g/rengine'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for SonarQube blame

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11
          cache: maven

      - name: Build & Test with JaCoCo
        run: |
          ./tools/build/run.sh build-maven \
            -DskipTests=false \
            -Djacoco.skip=false
        env:
          MAVEN_OPTS: "-Xmx2g -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn"

      - name: SonarQube Scan (Incremental)
        run: |
          # Run sonar with PR parameters for incremental coverage
          mvn sonar:sonar \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
            -Dsonar.pullrequest.branch=${{ github.head_ref }} \
            -Dsonar.pullrequest.base=${{ github.base_ref }} \
            -Dsonar.java.binaries="common/target/classes,apiserver/target/classes,controller/target/classes,service/target/classes" \
            -Dsonar.coverage.jacoco.xmlReportPaths="**/target/site/jacoco/jacoco.xml" \
            -Dsonar.exclusions="**/test/**,**/target/**,**/docs/**,**/example/**,**/rengine-operator/**,**/rengine-ui/**"
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
